# ============================================================
# NetworkAttachmentDefinition — Réseau LAN
# Sous-réseau : 192.168.10.0/24  |  VLAN : 10
# VMs connectées : VM1 (eth1, IP: 192.168.10.1) + VM3 (eth0, IP: 192.168.10.10)
# ============================================================
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lan-network
  namespace: projet-reseau
  annotations:
    k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/lan-bridge
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "lan-network",
      "type": "cnv-bridge",
      "bridge": "lan-bridge",
      "ipam": {
        "type": "static"
      },
      "vlan": 10
    }

# ============================================================
# NetworkAttachmentDefinition — Réseau DMZ
# Sous-réseau : 192.168.100.0/24  |  VLAN : 100
# VMs connectées : VM1 (eth2, IP: 192.168.100.1) + VM2 (pod, IP: 192.168.100.10)
# ============================================================
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: dmz-network
  namespace: fall2899-dev
  annotations:
    k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/dmz-bridge
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "dmz-network",
      "type": "cnv-bridge",
      "bridge": "dmz-bridge",
      "ipam": {
        "type": "static"
      },
      "vlan": 100
    }

# ============================================================
# VM2 — Serveur Web (Deployment conteneur OpenShift)
# Choix : conteneur plutôt que VirtualMachine (trial OpenShift limité)
# Conteneurs : nginx:1.25-alpine (reverse proxy) + node:18-alpine (app)
# Réseau DMZ  : 192.168.100.10
# Connexion DB: MySQL VM3 sur 192.168.10.10:3306
# ============================================================

# --- ConfigMap : configuration Nginx ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: projet-reseau
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        # Reverse proxy vers Node.js (localhost:3000)
        location / {
            proxy_pass         http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
---
# --- ConfigMap : application Node.js ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nodejs-app
  namespace: projet-reseau
data:
  package.json: |
    {
      "name": "projet-web-app",
      "version": "1.0.0",
      "main": "app.js",
      "dependencies": {
        "mysql2": "^3.6.0"
      }
    }
  app.js: |
    const http = require('http');
    const mysql = require('mysql2/promise');

    const dbConfig = {
      host:     process.env.DB_HOST,
      port:     3306,
      user:     process.env.DB_USER,
      password: process.env.DB_PASSWORD,
      database: process.env.DB_NAME,
    };

    const server = http.createServer(async (req, res) => {
      // Health check
      if (req.url === '/health') {
        res.writeHead(200);
        res.end('OK');
        return;
      }

      // Statut connexion DB
      if (req.url === '/api/status') {
        try {
          const conn = await mysql.createConnection(dbConfig);
          await conn.execute('SELECT 1');
          await conn.end();
          res.writeHead(200, { 'Content-Type': 'application/json' });
          res.end(JSON.stringify({
            status:    'ok',
            vm:        'VM2-conteneur (Nginx + Node.js)',
            db:        'VM3 MySQL connecté sur ' + process.env.DB_HOST,
            timestamp: new Date().toISOString()
          }));
        } catch (err) {
          res.writeHead(500, { 'Content-Type': 'application/json' });
          res.end(JSON.stringify({ status: 'error', message: err.message }));
        }
        return;
      }

      // API : liste des utilisateurs
      if (req.url === '/api/utilisateurs') {
        try {
          const conn = await mysql.createConnection(dbConfig);
          const [rows] = await conn.execute('SELECT id, nom, email, created_at FROM utilisateurs');
          await conn.end();
          res.writeHead(200, { 'Content-Type': 'application/json' });
          res.end(JSON.stringify(rows));
        } catch (err) {
          res.writeHead(500, { 'Content-Type': 'application/json' });
          res.end(JSON.stringify({ error: err.message }));
        }
        return;
      }

      // Page d'accueil
      res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
      res.end(`<!DOCTYPE html>
<html>
<head><title>Projet Fin de Module</title>
<style>
  body { font-family: sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; }
  h1   { color: #cc0000; }
  .vm  { background: #f5f5f5; border-radius: 8px; padding: 12px 16px; margin: 8px 0; }
  .tag { display: inline-block; background: #cc0000; color: white;
         font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-left: 8px; }
  a    { color: #cc0000; }
</style>
</head>
<body>
  <h1>Architecture 3-tiers sur OpenShift</h1>
  <div class="vm">VM1 — pfSense <span class="tag">VirtualMachine KubeVirt</span> — Firewall / NAT</div>
  <div class="vm">VM2 — Nginx + Node.js <span class="tag">Conteneur OpenShift</span> — Ce serveur</div>
  <div class="vm">VM3 — MySQL 8.0 <span class="tag">VirtualMachine KubeVirt</span> — Base de données (Fedora 39)</div>
  <p>
    <a href="/api/status">Tester la connexion MySQL</a> &nbsp;|&nbsp;
    <a href="/api/utilisateurs">Voir les utilisateurs</a>
  </p>
</body>
</html>`);
    });

    server.listen(3000, () => console.log('Node.js démarré sur le port 3000'));
---
# --- Secret : credentials MySQL (identiques à VM3/init.sql) ---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: projet-reseau
type: Opaque
stringData:
  DB_HOST:     "192.168.10.10"    # IP fixe de VM3 sur le réseau LAN
  DB_USER:     "webuser"
  DB_PASSWORD: "ChangeMe2024!"    # DOIT être identique à init.sql ligne CREATE USER
  DB_NAME:     "appdb"
---
# --- Deployment : Nginx + Node.js ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm2-web
  namespace: projet-reseau
  labels:
    app: vm2-web
    role: web-server
    projet: fin-de-module
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm2-web
  template:
    metadata:
      labels:
        app: vm2-web
    spec:
      securityContext:
        runAsNonRoot: true

      # Installe les dépendances npm avant de démarrer
      initContainers:
        - name: npm-install
          image: node:18-alpine
          command: ["sh", "-c", "cp /app-src/package.json /app/ && cd /app && npm install --production"]
          volumeMounts:
            - name: app-src
              mountPath: /app-src
            - name: app-runtime
              mountPath: /app
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      containers:
        # Conteneur Node.js (port 3000, interne)
        - name: nodejs
          image: node:18-alpine
          command: ["node", "/app/app.js"]
          ports:
            - containerPort: 3000
              name: nodejs
          envFrom:
            - secretRef:
                name: db-credentials
          volumeMounts:
            - name: app-src
              mountPath: /app-src
            - name: app-runtime
              mountPath: /app
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

        # Conteneur Nginx (port 80, exposé)
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsUser: 101

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: app-src
          configMap:
            name: nodejs-app
        - name: app-runtime
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

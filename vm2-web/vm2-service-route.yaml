# ============================================================
# Service + Route — VM2 Serveur Web
# URL publique HTTPS auto-générée par OpenShift :
# https://vm2-web-route-projet-reseau.apps.<cluster>
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: vm2-web-service
  namespace: projet-reseau
  labels:
    app: vm2-web
spec:
  selector:
    app: vm2-web
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vm2-web-route
  namespace: projet-reseau
  labels:
    app: vm2-web
spec:
  to:
    kind: Service
    name: vm2-web-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

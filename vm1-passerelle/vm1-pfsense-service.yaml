# ============================================================
# Service + Route — Interface web pfSense (VM1)
# Accès à la GUI pfSense depuis l'extérieur du cluster
# URL générée : https://vm1-pfsense-ui-projet-reseau.apps.<cluster>
# Identifiants par défaut : admin / pfsense  (à changer immédiatement)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: vm1-pfsense-ui
  namespace: projet-reseau
  labels:
    app: vm1-pfsense
spec:
  selector:
    kubevirt.io/vm: vm1-pfsense
  ports:
    - name: pfsense-ui
      port: 8443
      targetPort: 8443
      protocol: TCP
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vm1-pfsense-ui-route
  namespace: projet-reseau
  labels:
    app: vm1-pfsense
spec:
  to:
    kind: Service
    name: vm1-pfsense-ui
  port:
    targetPort: pfsense-ui
  tls:
    termination: passthrough

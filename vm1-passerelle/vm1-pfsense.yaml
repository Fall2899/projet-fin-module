# ============================================================
# VirtualMachine — VM1 Passerelle / Firewall
# OS      : pfSense CE 2.7.2 (FreeBSD) — obligatoire, pas de Fedora possible
# Rôle    : NAT Internet + séparation LAN/DMZ + règles firewall
# Réseaux :
#   eth0 (vtnet0) = WAN  — pod network OpenShift (accès Internet via masquerade)
#   eth1 (vtnet1) = LAN  — 192.168.10.1/24
#   eth2 (vtnet2) = DMZ  — 192.168.100.1/24
# ============================================================
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm1-pfsense
  namespace: projet-reseau
  labels:
    app: vm1-pfsense
    role: firewall-gateway
    projet: fin-de-module
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm1-pfsense
    spec:
      domain:
        cpu:
          cores: 2
          sockets: 1
          threads: 1
        memory:
          guest: 2Gi
        machine:
          type: q35
        resources:
          requests:
            memory: 2Gi
            cpu: "2"

        devices:
          disks:
            - name: pfsense-disk
              bootOrder: 1
              disk:
                bus: virtio

          interfaces:
            # WAN — accès Internet via NAT OpenShift (masquerade)
            - name: wan
              masquerade: {}
              model: virtio
              ports:
                - name: http
                  port: 80
                  protocol: TCP
                - name: https
                  port: 443
                  protocol: TCP
                - name: pfsense-ui
                  port: 8443
                  protocol: TCP

            # LAN — réseau interne 192.168.10.0/24
            - name: lan
              bridge: {}
              model: virtio

            # DMZ — zone démilitarisée 192.168.100.0/24
            - name: dmz
              bridge: {}
              model: virtio

      networks:
        - name: wan
          pod: {}
        - name: lan
          multus:
            networkName: lan-network
        - name: dmz
          multus:
            networkName: dmz-network

      volumes:
        - name: pfsense-disk
          dataVolume:
            name: pfsense-dv

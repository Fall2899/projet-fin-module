name: Deploy to OpenShift

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy infrastructure to OpenShift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Connexion à OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OC_SERVER }}
          openshift_token: ${{ secrets.OC_TOKEN }}
          namespace: ${{ secrets.OC_NAMESPACE }}
          insecure_skip_tls_verify: true

      - name: "[Réseau] LAN + DMZ"
        run: |
          oc apply -f reseau/nad-lan.yaml
          oc apply -f reseau/nad-dmz.yaml

      - name: "[VM1] pfSense — VirtualMachine KubeVirt"
        run: |
          oc apply -f vm1-passerelle/vm1-pfsense-datavolume.yaml
          oc apply -f vm1-passerelle/vm1-pfsense.yaml
          oc apply -f vm1-passerelle/vm1-pfsense-service.yaml

      - name: "[VM2] Nginx + Node.js — Deployment conteneur"
        run: |
          oc apply -f vm2-web/vm2-deployment.yaml
          oc apply -f vm2-web/vm2-service-route.yaml

      - name: "[VM2] Attendre pod prêt"
        run: |
          oc rollout status deployment/vm2-web \
            -n ${{ secrets.OC_NAMESPACE }} \
            --timeout=120s

      - name: "[VM3] ConfigMap init.sql"
        run: |
          oc apply -f vm3-db/vm3-init-configmap.yaml

      - name: "[VM3] MySQL — VirtualMachine KubeVirt"
        run: |
          oc apply -f vm3-db/vm3-datavolume.yaml
          oc apply -f vm3-db/vm3-db.yaml

      - name: Résumé déploiement
        run: |
          echo "=== VirtualMachines ==="
          oc get vm -n ${{ secrets.OC_NAMESPACE }}
          echo "=== Pods VM2 ==="
          oc get pods -n ${{ secrets.OC_NAMESPACE }} -l app=vm2-web
          echo "=== Routes ==="
          oc get routes -n ${{ secrets.OC_NAMESPACE }}
          echo "=== URL VM2 ==="
          oc get route vm2-web-route -n ${{ secrets.OC_NAMESPACE }} -o jsonpath='https://{.spec.host}'
